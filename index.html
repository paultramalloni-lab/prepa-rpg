// stage 0=terre, 1=graine, 2=pousse, 3=fleur petite, 4=pleine floraison
const getGardenStages=(todayMin)=>{
  const stages=[];
  for(let i=0;i<8;i++){
    const threshold=i*30; // chaque plante demande 30min de plus
    if(todayMin<threshold)stages.push(0);
    else if(todayMin<threshold+10)stages.push(1);
    else if(todayMin<threshold+20)stages.push(2);
    else if(todayMin<threshold+28)stages.push(3);
    else stages.push(4);
  }
  return stages;
};

// CSS
// ══════════════════════════════════════════════════════════════════
const CSS=`
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;500;600;700&family=Exo+2:ital,wght@0,300;0,400;1,400&display=swap');
  *{box-sizing:border-box;margin:0;padding:0}
  @keyframes spin      {to{transform:rotate(360deg)}}
  @keyframes bossFloat {0%,100%{transform:translateY(0)}50%{transform:translateY(-14px)}}
  @keyframes bossHit   {0%{transform:scale(1.3) rotate(8deg)}40%{transform:scale(.8) rotate(-6deg)}100%{transform:scale(1)}}
  @keyframes bossDead  {0%{transform:scale(1)}30%{transform:scale(1.3) rotate(15deg)}70%{transform:scale(.5) rotate(-30deg)}100%{transform:scale(0);opacity:0}}
  @keyframes fadeUp    {from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
  @keyframes fadeIn    {from{opacity:0}to{opacity:1}}
  @keyframes fadeInS   {from{opacity:0;transform:scale(.75)}to{opacity:1;transform:scale(1)}}
  @keyframes dmgFloat  {0%{opacity:1;transform:translateY(0) scale(1.4)}80%{opacity:.4}100%{opacity:0;transform:translateY(-80px) scale(.7)}}
  @keyframes ntfAnim   {0%{opacity:0;transform:translateY(-12px)}12%{opacity:1;transform:translateY(0)}80%{opacity:1}100%{opacity:0}}
  @keyframes lvlRay    {from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
  @keyframes heroGlow  {0%,100%{text-shadow:0 0 14px #ffd70055}50%{text-shadow:0 0 36px #ffd700,0 0 70px #ffd70044}}
  @keyframes screenFlash{0%{opacity:.25}100%{opacity:0}}
  @keyframes atkPulse  {0%,100%{transform:scale(1)}50%{transform:scale(1.014)}}
  @keyframes idle      {0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
  @keyframes victBounce{0%{transform:scale(0) rotate(-20deg)}60%{transform:scale(1.2) rotate(5deg)}80%{transform:scale(.95)}100%{transform:scale(1)}}
  @keyframes popIn     {0%{transform:scale(.85);opacity:0}100%{transform:scale(1);opacity:1}}
  @keyframes charFloat {0%,100%{transform:translateY(0)}50%{transform:translateY(-7px)}}
  @keyframes cloudPulse{0%,100%{opacity:.7}50%{opacity:1}}
  @keyframes authBg    {0%,100%{background-position:0% 50%}50%{background-position:100% 50%}}
  @keyframes bellRing  {0%,100%{transform:rotate(0)}20%{transform:rotate(-20deg)}40%{transform:rotate(20deg)}60%{transform:rotate(-12deg)}80%{transform:rotate(8deg)}}
  ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:#1a2040}::-webkit-scrollbar-thumb{background:#2a3560;border-radius:4px}
  .btn{transition:transform .1s,filter .1s;cursor:pointer;border:none;outline:none;font-family:inherit}.btn:hover{filter:brightness(1.12);transform:translateY(-1px)}.btn:active{transform:scale(.91)!important}
  .dcard{cursor:pointer;border:none;outline:none;font-family:inherit;transition:all .2s}.dcard:hover{transform:translateY(-3px) scale(1.018)!important}.dcard:active{transform:scale(.96)!important}
  .crow{transition:transform .12s,filter .12s;cursor:pointer}.crow:hover{transform:translateX(5px);filter:brightness(1.2)}.crow:active{transform:scale(.97)}
  .avitem{transition:all .15s;cursor:pointer;border:none;outline:none}.avitem:hover{transform:scale(1.06);filter:brightness(1.15)}.avitem:active{transform:scale(.94)}
  .nb{cursor:pointer;border:none;outline:none;background:none;font-family:inherit;transition:all .15s}
  .schedCell{transition:background .1s;cursor:pointer}.schedCell:hover{background:rgba(96,184,255,.07)!important}
  .authInput{transition:border .2s,box-shadow .2s}.authInput:focus{border-color:#ffd700!important;box-shadow:0 0 0 3px rgba(255,215,0,.12)!important}
  input,textarea{font-family:'Rajdhani',sans-serif}
  input::placeholder,textarea::placeholder{color:#4a5580}
`;

// SETUP GUIDE MODAL (shown when Supabase not configured)
// ══════════════════════════════════════════════════════════════════
function SetupGuide({onOffline}) {
  const BG="#0f1629",CARD="#1a2340",CARD2="#212b4a",BORDER="#2d3d6a",TEXT="#d0d8f0",TEXT2="#8090b8",GOLD="#ffd700";
  const [copied,setCopied]=useState(false);
  const SQL=`create table if not exists game_saves (\n  id         uuid        default gen_random_uuid() primary key,\n  user_id    uuid        references auth.users(id) on delete cascade not null unique,\n  data       jsonb       not null default '{}',\n  updated_at timestamptz default now()\n);\nalter table game_saves enable row level security;\ncreate policy "Own save" on game_saves for all using (auth.uid() = user_id);`;
  const copy=()=>{navigator.clipboard.writeText(SQL);setCopied(true);setTimeout(()=>setCopied(false),2000);};
  return(
    <div style={{minHeight:"100vh",background:BG,display:"flex",alignItems:"center",justifyContent:"center",padding:"20px",fontFamily:"'Rajdhani',sans-serif"}}>
      <style>{CSS}</style>
      <div style={{maxWidth:"500px",width:"100%",animation:"fadeUp .4s ease"}}>
        <div style={{textAlign:"center",marginBottom:"28px"}}>
          <div style={{fontFamily:"'Orbitron',sans-serif",fontSize:"2rem",fontWeight:900,color:GOLD,textShadow:`0 0 40px ${GOLD}55`,marginBottom:"8px"}}>⚔️ PRÉPA RPG</div>
          <div style={{fontFamily:"'Orbitron',sans-serif",fontSize:".68rem",color:TEXT2,letterSpacing:".25em"}}>CONFIGURATION REQUISE</div>
        </div>
        <div style={{background:CARD,border:`2px solid ${GOLD}44`,borderRadius:"18px",padding:"24px",marginBottom:"14px"}}>
          <div style={{fontFamily:"'Orbitron',sans-serif",fontSize:".72rem",color:GOLD,letterSpacing:".18em",marginBottom:"16px"}}>📋 ÉTAPES POUR METTRE EN LIGNE</div>
          {[
            {n:1,t:"Crée un compte Supabase (gratuit)",d:"supabase.com → New project"},
            {n:2,t:"Copie l'URL et la clé anon",d:"Settings → API → Project URL + anon key"},
            {n:3,t:"Colle-les dans ce fichier HTML",d:"Lignes SUPABASE_URL et SUPABASE_ANON_KEY"},
            {n:4,t:"Exécute le SQL ci-dessous",d:"Supabase → SQL Editor → New query"},
            {n:5,t:"Désactive la vérif email",d:"Authentication → Settings → Confirm email: OFF"},
            {n:6,t:"Dépose sur Netlify Drop",d:"netlify.com/drop → glisse-dépose le fichier"},
          ].map(s=>(
            <div key={s.n} style={{display:"flex",gap:"12px",padding:"10px 0",borderBottom:`1px solid ${BORDER}`,alignItems:"flex-start"}}>
              <div style={{width:"26px",height:"26px",borderRadius:"50%",background:`${GOLD}22`,border:`2px solid ${GOLD}66`,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Orbitron',sans-serif",fontSize:".68rem",fontWeight:900,color:GOLD,flexShrink:0}}>{s.n}</div>
              <div>
                <div style={{fontSize:".92rem",color:TEXT,fontWeight:600}}>{s.t}</div>
                <div style={{fontSize:".76rem",color:TEXT2,fontFamily:"'Exo 2',sans-serif",marginTop:"2px"}}>{s.d}</div>
              </div>
            </div>
          ))}
        </div>
        <div style={{background:CARD,border:`1px solid #4dffc344`,borderRadius:"14px",padding:"16px",marginBottom:"14px"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"10px"}}>
            <div style={{fontFamily:"'Orbitron',sans-serif",fontSize:".62rem",color:"#4dffc3",letterSpacing:".16em"}}>SQL À EXÉCUTER</div>
            <button className="btn" onClick={copy} style={{padding:"5px 12px",background:copied?"#1a3a20":"transparent",border:`1px solid ${copied?"#4dffc3":"#4dffc344"}`,borderRadius:"8px",color:"#4dffc3",fontFamily:"'Orbitron',sans-serif",fontSize:".58rem",cursor:"pointer",fontWeight:700,transition:"all .2s"}}>
              {copied?"✅ COPIÉ":"📋 COPIER"}
            </button>
          </div>
          <pre style={{fontSize:".68rem",color:"#8090b8",fontFamily:"monospace",lineHeight:1.7,overflowX:"auto",whiteSpace:"pre-wrap",wordBreak:"break-word"}}>{SQL}</pre>
        </div>
        <button className="btn" onClick={onOffline} style={{width:"100%",padding:"15px",background:`linear-gradient(145deg,${CARD2},${CARD})`,border:`1px solid ${BORDER}`,borderRadius:"13px",color:TEXT2,fontFamily:"'Orbitron',sans-serif",fontSize:".75rem",fontWeight:700,cursor:"pointer",letterSpacing:".12em"}}>
          JOUER HORS LIGNE SANS COMPTE →
        </button>
        <div style={{textAlign:"center",marginTop:"10px",fontSize:".7rem",color:TEXT2,fontFamily:"'Exo 2',sans-serif",fontStyle:"italic"}}>Tes données seront sauvegardées localement dans ce navigateur</div>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════
// AUTH SCREEN
// ══════════════════════════════════════════════════════════════════
function AuthScreen({onOffline}) {
  const BG="#0f1629",CARD="#1a2340",CARD2="#212b4a",BORDER="#2d3d6a",TEXT="#d0d8f0",TEXT2="#8090b8",GOLD="#ffd700";
  const [mode,setMode]=useState("login");
  const [email,setEmail]=useState("");
  const [password,setPwd]=useState("");
  const [confirm,setConfirm]=useState("");
  const [pseudo,setPseudo]=useState("");
  const [loading,setLoading]=useState(false);
  const [error,setError]=useState("");
  const [success,setSuccess]=useState("");

  const submit=async()=>{
    setError("");setSuccess("");setLoading(true);
    try{
      if(mode==="login"){
        const {error:e}=await sb.auth.signInWithPassword({email:email.trim(),password});
        if(e)throw new Error(translateError(e.message));
      } else {
        if(!pseudo.trim())throw new Error("Choisis un pseudo");
        if(password.length<6)throw new Error("Mot de passe trop court (6 caractères minimum)");
        if(password!==confirm)throw new Error("Les mots de passe ne correspondent pas");
        const {error:e}=await sb.auth.signUp({email:email.trim(),password,options:{data:{pseudo:pseudo.trim()}}});
        if(e)throw new Error(translateError(e.message));
        setSuccess("✅ Compte créé ! Connecte-toi maintenant.");
        setMode("login");setPwd("");setConfirm("");setPseudo("");
      }
    }catch(e){setError(e.message);}
    setLoading(false);
  };

  const translateError=msg=>{
    if(msg.includes("Invalid login"))return "Email ou mot de passe incorrect";
    if(msg.includes("already registered"))return "Cet email est déjà utilisé";
    if(msg.includes("valid email"))return "Adresse email invalide";
    if(msg.includes("Network"))return "Problème de connexion";
    return msg;
  };

  const handleKey=e=>{if(e.key==="Enter")submit();};

  return(
    <div style={{minHeight:"100vh",background:`radial-gradient(ellipse at 30% 20%,rgba(255,107,138,.08),transparent 50%),radial-gradient(ellipse at 70% 80%,rgba(96,184,255,.08),transparent 50%),${BG}`,display:"flex",alignItems:"center",justifyContent:"center",padding:"20px",fontFamily:"'Rajdhani',sans-serif",position:"relative",overflow:"hidden"}}>
      <style>{CSS}</style>
      {/* Stars */}
      {[...Array(20)].map((_,i)=><div key={i} style={{position:"absolute",width:i%3===0?2:1,height:i%3===0?2:1,borderRadius:"50%",background:"white",top:`${(i*17+7)%90+5}%`,left:`${(i*23+11)%90+5}%`,opacity:.4+((i*.07)%0.4)}}/>)}

      <div style={{maxWidth:"420px",width:"100%",animation:"fadeUp .4s ease",position:"relative",zIndex:1}}>
        {/* Logo */}
        <div style={{textAlign:"center",marginBottom:"32px"}}>
          <div style={{fontFamily:"'Orbitron',sans-serif",fontSize:"clamp(1.8rem,8vw,2.4rem)",fontWeight:900,color:GOLD,textShadow:`0 0 50px ${GOLD}55,0 0 100px ${GOLD}22`,letterSpacing:".1em",marginBottom:"6px"}}>⚔️ PRÉPA RPG</div>
          <div style={{fontFamily:"'Orbitron',sans-serif",fontSize:".62rem",color:TEXT2,letterSpacing:".28em"}}>TON JEU. TES RÈGLES. TA PRÉPA.</div>
        </div>

        {/* Card */}
        <div style={{background:CARD,border:`1px solid ${BORDER}`,borderRadius:"20px",padding:"28px 24px",boxShadow:"0 24px 80px rgba(0,0,0,.6)"}}>
          {/* Mode tabs */}
          <div style={{display:"flex",gap:"6px",marginBottom:"24px",background:CARD2,padding:"5px",borderRadius:"12px"}}>
            {[{id:"login",l:"Se connecter"},{id:"signup",l:"Créer un compte"}].map(t=>(
              <button key={t.id} className="btn" onClick={()=>{setMode(t.id);setError("");setSuccess("");}} style={{flex:1,padding:"10px",borderRadius:"9px",border:"none",background:mode===t.id?`linear-gradient(145deg,#2a3a60,#3a4a80)`:"transparent",color:mode===t.id?GOLD:TEXT2,fontFamily:"'Orbitron',sans-serif",fontSize:".6rem",fontWeight:700,cursor:"pointer",letterSpacing:".08em",transition:"all .2s"}}>
                {t.l}
              </button>
            ))}
          </div>

          {/* Fields */}
          <div style={{display:"flex",flexDirection:"column",gap:"12px"}}>
            {mode==="signup"&&(
              <div>
                <div style={{fontFamily:"'Orbitron',sans-serif",fontSize:".58rem",color:TEXT2,letterSpacing:".12em",marginBottom:"6px"}}>PSEUDO</div>
                <input value={pseudo} onChange={e=>setPseudo(e.target.value)} onKeyDown={handleKey} placeholder="Ton pseudo en jeu..." className="authInput" style={{width:"100%",background:CARD2,border:`1px solid ${BORDER}`,borderRadius:"10px",padding:"13px 15px",color:TEXT,fontSize:"1rem",outline:"none"}}/>
              </div>
            )}
            <div>
              <div style={{fontFamily:"'Orbitron',sans-serif",fontSize:".58rem",color:TEXT2,letterSpacing:".12em",marginBottom:"6px"}}>EMAIL</div>
              <input value={email} onChange={e=>setEmail(e.target.value)} onKeyDown={handleKey} type="email" placeholder="ton@email.com" className="authInput" style={{width:"100%",background:CARD2,border:`1px solid ${BORDER}`,borderRadius:"10px",padding:"13px 15px",color:TEXT,fontSize:"1rem",outline:"none"}}/>
            </div>
            <div>
              <div style={{fontFamily:"'Orbitron',sans-serif",fontSize:".58rem",color:TEXT2,letterSpacing:".12em",marginBottom:"6px"}}>MOT DE PASSE</div>
              <input value={password} onChange={e=>setPwd(e.target.value)} onKeyDown={handleKey} type="password" placeholder={mode==="signup"?"6 caractères minimum...":"••••••••"} className="authInput" style={{width:"100%",background:CARD2,border:`1px solid ${BORDER}`,borderRadius:"10px",padding:"13px 15px",color:TEXT,fontSize:"1rem",outline:"none"}}/>
            </div>
            {mode==="signup"&&(
              <div>
                <div style={{fontFamily:"'Orbitron',sans-serif",fontSize:".58rem",color:TEXT2,letterSpacing:".12em",marginBottom:"6px"}}>CONFIRMER</div>
                <input value={confirm} onChange={e=>setConfirm(e.target.value)} onKeyDown={handleKey} type="password" placeholder="Retape le mot de passe..." className="authInput" style={{width:"100%",background:CARD2,border:`1px solid ${BORDER}`,borderRadius:"10px",padding:"13px 15px",color:TEXT,fontSize:"1rem",outline:"none"}}/>
              </div>
            )}
          </div>

          {/* Error / Success */}
          {error&&<div style={{marginTop:"14px",padding:"11px 14px",background:"rgba(255,107,138,.12)",border:"1px solid #ff6b8a44",borderRadius:"10px",fontSize:".84rem",color:"#ff6b8a",fontFamily:"'Exo 2',sans-serif"}}>{error}</div>}
          {success&&<div style={{marginTop:"14px",padding:"11px 14px",background:"rgba(77,255,195,.12)",border:"1px solid #4dffc344",borderRadius:"10px",fontSize:".84rem",color:"#4dffc3",fontFamily:"'Exo 2',sans-serif"}}>{success}</div>}

          {/* Submit */}
          <button className="btn" onClick={submit} disabled={loading} style={{width:"100%",marginTop:"20px",padding:"16px",background:loading?CARD2:`linear-gradient(145deg,#2a2010,#3a3018)`,border:`2px solid ${loading?BORDER:GOLD}`,borderRadius:"13px",color:loading?TEXT2:GOLD,fontFamily:"'Orbitron',sans-serif",fontSize:".82rem",fontWeight:900,cursor:loading?"not-allowed":"pointer",letterSpacing:".2em",transition:"all .2s",boxShadow:loading?"none":`0 0 30px ${GOLD}22`}}>
            {loading?(
              <span style={{display:"flex",alignItems:"center",justifyContent:"center",gap:"10px"}}>
                <span style={{width:"16px",height:"16px",border:"2px solid #ffffff22",borderTopColor:GOLD,borderRadius:"50%",display:"inline-block",animation:"spin .7s linear infinite"}}/>
                CHARGEMENT...
              </span>
            ):mode==="login"?"⚔️ ENTRER DANS L'ARÈNE":"✨ CRÉER MON HÉROS"}
          </button>

          {/* Offline */}
          <button className="btn" onClick={onOffline} style={{width:"100%",marginTop:"10px",padding:"12px",background:"transparent",border:`1px solid ${BORDER}`,borderRadius:"11px",color:TEXT2,fontFamily:"'Orbitron',sans-serif",fontSize:".64rem",fontWeight:600,cursor:"pointer",letterSpacing:".1em"}}>
            JOUER HORS LIGNE SANS COMPTE
          </button>
        </div>

        <div style={{textAlign:"center",marginTop:"16px",fontSize:".68rem",color:TEXT2,fontFamily:"'Exo 2',sans-serif",fontStyle:"italic",opacity:.6}}>
          Tes données cloud sont chiffrées et sécurisées via Supabase
        </div>
      </div>
    </div>
  );
}

          <rect x={46} y={186} width={30} height={72} rx={7} fill={od.btm}/><rect x={84} y={186} width={30} height={72} rx={7} fill={od.btm}/>
          <line x1={61} y1={196} x2={61} y2={252} stroke="rgba(0,0,0,.12)" strokeWidth={2}/><line x1={99} y1={196} x2={99} y2={252} stroke="rgba(0,0,0,.12)" strokeWidth={2}/>
          {ot.id==="ot6"&&<path d={`M38,172 L28,272 L132,272 L122,172`} fill={od.top} opacity={.85}/>}

          <rect x={20} y={110} width={22} height={76} rx={10} fill={od.slv}/><rect x={20} y={110} width={6} height={76} rx={8} fill="rgba(0,0,0,.1)"/>
          <ellipse cx={31} cy={191} rx={12} ry={11} fill={sk}/><ellipse cx={31} cy={188} rx={8} ry={6} fill={sk}/>
          <rect x={118} y={110} width={22} height={76} rx={10} fill={od.slv}/><rect x={134} y={110} width={6} height={76} rx={8} fill="rgba(0,0,0,.1)"/>
          <ellipse cx={129} cy={191} rx={12} ry={11} fill={sk}/><ellipse cx={129} cy={188} rx={8} ry={6} fill={sk}/>

          {hairEl()}
          <ellipse cx={HX} cy={HY} rx={HR} ry={HR-1} fill={sk}/>

          <ellipse cx={65} cy={63} rx={9} ry={8} fill="#ffffff"/><ellipse cx={95} cy={63} rx={9} ry={8} fill="#ffffff"/>

// MAIN GAME
// ══════════════════════════════════════════════════════════════════
function Game({user, offline}) {
  const BG="#0f1629",CARD="#1a2340",CARD2="#212b4a",BORDER="#2d3d6a",TEXT="#d0d8f0",TEXT2="#8090b8",GOLD="#ffd700";

  // Data loading state
  const [dataReady, setDataReady] = useState(false);
  const [cloudStatus,setCloudStatus]=useState("idle"); // idle | saving | saved | error

  // Game state
  const [scr,    setScr]   = useState("hub");
  const [hero,   setHero]  = useState({name:"Héros",xp:0,streak:1,lastDate:null,raids:0,coins:0,workLog:{}});
  const [chaps,  setChaps] = useState(mkC());
  const [quests, setQ]     = useState([]);
  const [journal,setJ]     = useState([]);
  const [bought, setBought]= useState([]);
  const [avatar, setAv]    = useState(DAV);
  const [owned,  setOwned] = useState(new Set([...FREE_IDS]));
  const [sched,  setSched] = useState({});
  const [clan,   setClan]  = useState(null);
  const [clanData,setClanData]=useState(null);
  const [collection,setCollection]=useState([]); // [{id, creatureId, obtainedAt}]
  const [boxAnim,setBoxAnim]=useState(null); // {creature, box} for reveal animation

  // UI state
  const [raid,   setRaid]  = useState(null);
  const [selS,   setSelS]  = useState(null);
  const [selD,   setSelD]  = useState(60);
  const [monHit, setMH]    = useState(false);
  const [dmgs,   setDmgs]  = useState([]);
  const [flashFx,setFlash] = useState(false);
  const [lvlUp,  setLvlUp] = useState(null);
  const [ntf,    setNtf]   = useState(null);
  const [victory,setVic]   = useState(false);
  const [editN,  setEditN] = useState(false);
  const [nVal,   setNVal]  = useState("Héros");
  const [qTxt,   setQTxt]  = useState("");
  const [jTxt,   setJTxt]  = useState("");
  const [buyConf,setBuyConf]=useState(null);
  const [avCat,  setAvCat] = useState("skin");
  const [shopTab,setShopTab]=useState("rewards");
  const [editCell,setEditCell]=useState(null);
  const [cellTxt, setCellTxt]=useState("");
  const [cellCol, setCellCol]=useState("#60b8ff");
  const [cellAlert,setCellAlert]=useState(false);
  const [clanTab,setClanTab]=useState("members");
  const [rankCat,setRankCat]=useState("time");
  const [chatTxt,setChatTxt]=useState("");
  const [joinCode,setJoinCode]=useState("");
  const [clanName,setClanName]=useState("");
  const [clock,  setClock] = useState(new Date());
  const [notifPerm,setNotifPerm]=useState(()=>typeof Notification!=="undefined"?Notification.permission:"denied");
  const [showLogout,setShowLogout]=useState(false);

  // ── GOOGLE CALENDAR ICS STATE (multi-agenda) ──
  const [icsLinks,    setIcsLinks]    = useState(()=>sg("gcal_links",[])); // [{url,label,color}]
  const [icsEvents,   setIcsEvents]   = useState([]);
  const [icsLoading,  setIcsLoading]  = useState(false);
  const [icsWeekOff,  setIcsWeekOff]  = useState(0);
  const [showIcsGuide,setShowIcsGuide]= useState(false);
  const [icsNewUrl,   setIcsNewUrl]   = useState("");
  const [icsNewLabel, setIcsNewLabel] = useState("");
  const [icsNewColor, setIcsNewColor] = useState("#4dffc3");
  const [icsError,    setIcsError]    = useState("");

  const tmrRef=useRef(null),ntfRef=useRef(null),dmgId=useRef(0),doneRef=useRef(false);
  const saveTimer=useRef(null),firedRef=useRef(new Set());

  // ── LOAD DATA ──────────────────────────────────────────────────
  useEffect(()=>{
    const load=async()=>{
      let data=null;
      // Try cloud first if logged in
      if(user&&sb&&!offline){
        try{
          const {data:row}=await sb.from("game_saves").select("data").eq("user_id",user.id).single();
          if(row?.data)data=row.data;
        }catch(e){}
      }
      // Fall back to localStorage
      if(!data){
        const pseudo=user?.user_metadata?.pseudo||sg("r6h",{name:"Héros"}).name;
        data={
          hero:sg("r6h",{name:pseudo,xp:0,streak:1,lastDate:null,raids:0,coins:0,workLog:{}}),
          chaps:(()=>{const m=mkC(),c=sg("r6c",mkC());Object.keys(m).forEach(s=>{if(c[s])m[s]=m[s].map(ch=>c[s].find(sc=>sc.name===ch.name)||ch);});return m;})(),
          quests:sg("r6q",[]),journal:sg("r6j",[]),bought:sg("r6br",[]),
          avatar:sg("r6av",DAV),owned:sg("r6own",[...FREE_IDS]),
          sched:sg("r6sc",{}),clan:sg("r6clan",null),
          collection:sg("r6col",[]),
        };
      }
      // Apply data
      setHero(h=>{
        const base=data.hero||{name:"Héros",xp:0,streak:1,lastDate:null,raids:0,coins:0};
        // Streak check
        const today=new Date().toDateString(),y=new Date();y.setDate(y.getDate()-1);
        const streak=base.lastDate===today?base.streak:base.lastDate===y.toDateString()?(base.streak||1)+1:1;
        return{...base,streak,lastDate:today};
      });
      if(data.chaps){const m=mkC();Object.keys(m).forEach(s=>{if(data.chaps[s])m[s]=m[s].map(ch=>data.chaps[s].find(sc=>sc.name===ch.name)||ch);});setChaps(m);}
      if(data.quests)setQ(data.quests);
      if(data.journal)setJ(data.journal);
      if(data.bought)setBought(data.bought);
      if(data.avatar)setAv(data.avatar);
      if(data.owned)setOwned(new Set(data.owned));
      if(data.sched)setSched(data.sched);
      if(data.clan){setClan(data.clan);const cd=sg(`clan_${data.clan.code}`,null);if(cd)setClanData(cd);}
      if(data.collection)setCollection(data.collection);
      setNVal((data.hero?.name)||user?.user_metadata?.pseudo||"Héros");
      setDataReady(true);
    };
    load();
  },[user]);

  // ── CLOUD SAVE (debounced 4s) ───────────────────────────────────
  useEffect(()=>{
    if(!dataReady)return;
    // Save to localStorage immediately
    ss("r6h",hero);ss("r6c",chaps);ss("r6q",quests);ss("r6j",journal);
    ss("r6br",bought);ss("r6av",avatar);ss("r6own",[...owned]);ss("r6sc",sched);
    ss("r6col",collection);
    if(clan)ss("r6clan",clan);
    // Debounced cloud save
    if(!user||!sb||offline)return;
    if(saveTimer.current)clearTimeout(saveTimer.current);
    setCloudStatus("idle");
    saveTimer.current=setTimeout(async()=>{
      setCloudStatus("saving");
      try{
        const data={hero,chaps,quests,journal,bought,avatar,owned:[...owned],sched,clan,collection};
        await sb.from("game_saves").upsert({user_id:user.id,data,updated_at:new Date().toISOString()},{onConflict:"user_id"});
        setCloudStatus("saved");
        setTimeout(()=>setCloudStatus("idle"),3000);
      }catch(e){setCloudStatus("error");setTimeout(()=>setCloudStatus("idle"),4000);}
    },4000);
  },[hero,chaps,quests,journal,bought,avatar,owned,sched,clan,collection,dataReady]);

  // ── CLOCK ──
  useEffect(()=>{const t=setInterval(()=>setClock(new Date()),1000);return()=>clearInterval(t);},[]);

  // ── ALERTS ──
  useEffect(()=>{
    const check=()=>{
      const now=new Date(),h=now.getHours(),m=now.getMinutes();if(m!==0)return;
      const dow=now.getDay(),dayIdx=dow===0?6:dow-1,slotIdx=h-6;
      if(slotIdx<0||slotIdx>18)return;
      const k=`${dayIdx}-${slotIdx}`,cell=sched[k];
      if(cell?.alert&&!firedRef.current.has(k+"-"+now.toDateString())){
        firedRef.current.add(k+"-"+now.toDateString());
        if(notifPerm==="granted"&&typeof Notification!=="undefined")
          new Notification(`⏰ PRÉPA RPG — ${h}h00`,{body:`🗓️ ${cell.text} commence maintenant !`});
        else showNtf({msg:`⏰ ${cell.text} commence !`,col:"#ffb347"});
      }
    };
    const t=setInterval(check,30000);check();return()=>clearInterval(t);
  },[sched,notifPerm]);

  // Cross-tab clan sync
  useEffect(()=>{
    const h=(e)=>{if(clan?.code&&e.key===`clan_${clan.code}`){try{const d=JSON.parse(e.newValue);if(d)setClanData(d);}catch{}}};
    window.addEventListener("storage",h);return()=>window.removeEventListener("storage",h);
  },[clan]);

  const showNtf=useCallback((obj)=>{
    setNtf(obj);if(ntfRef.current)clearTimeout(ntfRef.current);ntfRef.current=setTimeout(()=>setNtf(null),3200);
  },[]);

  const notify=useCallback((msg,col=GOLD)=>showNtf({msg,col}),[showNtf]);

  const gainXP=useCallback((amt)=>{
    setHero(p=>{
      const oLv=getLv(p.xp),nxp=p.xp+amt,nLv=getLv(nxp),coins=p.coins+Math.floor(amt/2);

  const parseICS=(icsText)=>{
    const events=[];
    const lines=icsText.replace(/\r\n /g,"").replace(/\r\n/g,"\n").replace(/\n /g,"").split("\n");
    let ev=null;
    lines.forEach(line=>{
      if(line==="BEGIN:VEVENT"){ev={};}
      else if(line==="END:VEVENT"&&ev){events.push(ev);ev=null;}
      else if(ev){
        const idx=line.indexOf(":");if(idx<0)return;
        const key=line.substring(0,idx).split(";")[0];
        const val=line.substring(idx+1);
        if(key==="SUMMARY")ev.summary=val;
        else if(key==="DTSTART"||key==="DTSTART")ev.start=val;
        else if(key==="DTEND")ev.end=val;
        else if(key==="UID")ev.uid=val;
        else if(key==="DESCRIPTION")ev.description=val.replace(/\\n/g,"\n");
        else if(key==="LOCATION")ev.location=val;
      }
    });
    return events;
  };

  const parseICSDate=(str)=>{
    if(!str)return null;
    const clean=str.replace(/Z$/,"");
    if(clean.length===8)return new Date(parseInt(clean.slice(0,4)),parseInt(clean.slice(4,6))-1,parseInt(clean.slice(6,8)));
    return new Date(parseInt(clean.slice(0,4)),parseInt(clean.slice(4,6))-1,parseInt(clean.slice(6,8)),parseInt(clean.slice(9,11)),parseInt(clean.slice(11,13)),parseInt(clean.slice(13,15)||0));
  };

    d.setHours(0,0,0,0);return d;
  };

    if(offset===0)return`Cette semaine (${fmt(monday)} – ${fmt(sunday)})`;
    if(offset===-1)return`Semaine dernière`;
    if(offset===1)return`Semaine prochaine`;

  };

    const sunday=new Date(monday);sunday.setDate(monday.getDate()+7);

        try{

          // Tag each event with its agenda color and label
          return evs.map(ev=>({...ev,_color:link.color,_label:link.label}));

      }));
      const flat=allResults.flat();
      // Filter to current week
      const weekEvs=flat.filter(ev=>{
        const start=parseICSDate(ev.start);
        return start&&start>=monday&&start<sunday;

            <div style={{width:"100%",maxWidth:"390px",marginBottom:"14px"}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:"4px"}}>
                <span style={{fontSize:".7rem",color:"#ff6b8a",fontFamily:"'Orbitron',sans-serif",fontWeight:700}}>❤️ PV ENNEMI</span>
                <span style={{fontSize:".7rem",color:"#ff6b8a",fontFamily:"'Orbitron',sans-serif"}}>{raid.mhp}%</span>
              </div>
              <div style={{height:"20px",background:CARD2,borderRadius:"10px",overflow:"hidden",border:`1px solid ${BORDER}`}}>
                <div style={{height:"100%",width:`${mPct}%`,background:"linear-gradient(90deg,#cc0022,#ff3355,#ff7766)",borderRadius:"10px",transition:"width .5s ease",position:"relative",overflow:"hidden"}}>
                  <div style={{position:"absolute",inset:0,background:"linear-gradient(180deg,rgba(255,255,255,.25),transparent 50%)"}}/>
                </div>
              </div>
            </div>
            <div style={{position:"relative",textAlign:"center",marginBottom:"8px"}}>
              <div style={{fontSize:"clamp(6rem,20vw,9rem)",lineHeight:1,animation:victory?"bossDead .7s ease forwards":monHit?"bossHit .4s ease":"bossFloat 3s ease-in-out infinite",filter:victory?"none":monHit?`drop-shadow(0 0 60px white)`:`drop-shadow(0 0 30px ${dg.color})`}}>{dg.boss.icon}</div>
              {dmgs.map(d=><div key={d.id} style={{position:"absolute",top:"10%",left:"50%",fontFamily:"'Orbitron',sans-serif",fontSize:"clamp(1.4rem,6vw,2rem)",fontWeight:900,color:"#ff5577",textShadow:"0 0 14px #ff5577",animation:"dmgFloat 1.2s ease forwards",pointerEvents:"none",transform:"translateX(-50%)",zIndex:20}}>-{d.n}</div>)}
            </div>
            <div style={{fontSize:".78rem",color:TEXT2,fontStyle:"italic",fontFamily:"'Exo 2',sans-serif",marginBottom:"16px",textAlign:"center"}}>{dg.boss.flavor}</div>
            <div style={{position:"relative",width:148,height:148,marginBottom:"12px",flexShrink:0}}>
              <svg style={{position:"absolute",inset:0,width:"100%",height:"100%",transform:"rotate(-90deg)"}} viewBox="0 0 148 148">
                <circle cx="74" cy="74" r="64" fill="none" stroke={CARD2} strokeWidth="9"/>
                <circle cx="74" cy="74" r="64" fill="none" stroke={danger?"#ff5577":dg.color} strokeWidth="9" strokeDasharray={`${2*Math.PI*64}`} strokeDashoffset={`${2*Math.PI*64*(1-tPct/100)}`} strokeLinecap="round" style={{transition:"stroke-dashoffset 1s linear",filter:`drop-shadow(0 0 8px ${danger?"#ff5577":dg.color})`}}/>
              </svg>
              <div style={{position:"absolute",inset:0,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center"}}>
                <div style={{fontFamily:"'Orbitron',sans-serif",fontSize:"clamp(1.8rem,7vw,2.4rem)",fontWeight:900,color:danger?"#ff5577":TEXT,lineHeight:1,transition:"color .3s"}}>{p2(tM)}:{p2(tS)}</div>
                <div style={{fontSize:".5rem",color:TEXT2,fontFamily:"'Orbitron',sans-serif",letterSpacing:".18em",marginTop:4}}>RESTANT</div>
              </div>
            </div>
            <div style={{width:"100%",maxWidth:"390px",background:CARD,border:`1px solid ${BORDER}`,borderRadius:"12px",padding:"9px 14px",marginBottom:"11px",minHeight:"60px"}}>
              {raid.log.map((e,i)=><div key={i} style={{fontSize:".8rem",color:i===0?TEXT:TEXT2,fontWeight:i===0?600:400,lineHeight:1.6,opacity:Math.max(0,1-i*.28)}}>{e}</div>)}
            </div>
            <div style={{width:"100%",maxWidth:"390px",marginBottom:"14px"}}>
              {victory?<div style={{textAlign:"center",padding:"20px",animation:"victBounce .6s ease forwards"}}><div style={{fontSize:"3.5rem",marginBottom:"8px",filter:"drop-shadow(0 0 40px gold)"}}>🏆</div><div style={{fontFamily:"'Orbitron',sans-serif",fontSize:"1.3rem",fontWeight:900,color:GOLD,letterSpacing:".25em"}}>VICTOIRE !</div><div style={{fontSize:".76rem",color:TEXT2,marginTop:"8px"}}>+{XPMAP[selD]} XP · +{Math.floor(XPMAP[selD]/2)} 🪙 · +{selD} min logged</div></div>
              :(()=>{const pct=(1-raid.time/raid.total)*100;const phase=pct<20?"🌱 Mise en route":pct<45?"📚 Concentration":pct<70?"🔥 Dans la zone":pct<90?"⚡ Flow state":"🏆 Dernière ligne !";const phaseCol=pct<20?TEXT2:pct<45?"#60b8ff":pct<70?"#ffb347":"#4dffc3";return(
                <div style={{width:"100%",maxWidth:"390px"}}>
                  <div style={{background:`linear-gradient(145deg,${CARD2},${dg.glow.replace(".3",".12")})`,border:`2px solid ${dg.color}55`,borderRadius:"18px",padding:"18px",textAlign:"center",position:"relative",overflow:"hidden"}}>
                    <div style={{position:"absolute",inset:0,background:`linear-gradient(180deg,rgba(255,255,255,.04),transparent)`,borderRadius:"16px"}}/>
                    <div style={{fontFamily:"'Orbitron',sans-serif",fontSize:"1.1rem",fontWeight:900,color:phaseCol,letterSpacing:".15em",marginBottom:"6px",textShadow:`0 0 20px ${phaseCol}66`}}>{phase}</div>
                    <div style={{fontSize:".78rem",color:TEXT2,fontFamily:"'Exo 2',sans-serif",fontStyle:"italic"}}>Continue à travailler — le temps s'écoule ⏳</div>
                    <div style={{marginTop:"12px",height:"6px",background:CARD,borderRadius:"3px",overflow:"hidden",border:`1px solid ${BORDER}`}}>
                      <div style={{height:"100%",width:`${pct}%`,background:`linear-gradient(90deg,${dg.color}66,${dg.color})`,borderRadius:"3px",transition:"width 1s linear",boxShadow:`0 0 8px ${dg.color}55`}}/>
                    </div>
                    <div style={{display:"flex",justifyContent:"space-between",marginTop:"4px"}}>
                      <span style={{fontSize:".52rem",color:TEXT2,fontFamily:"'Orbitron',sans-serif"}}>DÉBUT</span>
                      <span style={{fontSize:".52rem",color:dg.color,fontFamily:"'Orbitron',sans-serif",fontWeight:700}}>{Math.round(pct)}%</span>
                      <span style={{fontSize:".52rem",color:TEXT2,fontFamily:"'Orbitron',sans-serif"}}>FIN</span>
                    </div>
                  </div>
                </div>
              );})()}
            </div>
          </div>
          <div style={{padding:"0 0 20px",flexShrink:0}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
              <span style={{fontSize:".64rem",color:"#4dffc3",fontFamily:"'Orbitron',sans-serif",fontWeight:600}}>⚔️ {hero.name} · NIV.{lv}</span>
              <span style={{fontSize:".64rem",color:"#4dffc388",fontFamily:"'Orbitron',sans-serif"}}>FOCUS</span>
            </div>
            <div style={{height:"8px",background:CARD2,borderRadius:"4px",overflow:"hidden",border:`1px solid ${BORDER}`}}>
              <div style={{height:"100%",width:`${tPct}%`,background:"linear-gradient(90deg,#4dffc3,#22cc88)",borderRadius:"4px",transition:"width 1s linear"}}/>
            </div>
          </div>
        </div>
      </div>
    );
  }

  // ── GARDEN SVG COMPONENT ─────────────────────────────────────
  const GardenSVG=({todayMin})=>{
    const stages=getGardenStages(todayMin);
    const renderPlant=(p,stage,i)=>{
      if(stage===0)return <ellipse key={i} cx={p.x} cy={p.y} rx={6} ry={3} fill="#3a2810" opacity={.6}/>;
      const s=p.scale,x=p.x,y=p.y;
      const colors=[["#40a020","#60c030"],["#30a830","#50d040"],["#e86090","#f080a8"],["#f8a000","#ffc030"],["#c040f0","#e060ff"]];
      const [stem,bloom]=colors[i%5];
      if(stage===1)return <g key={i}><ellipse cx={x} cy={y} rx={6*s} ry={3} fill="#3a2810" opacity={.5}/><rect x={x-1.5} y={y-8*s} width={3} height={8*s} rx={1.5} fill={stem}/><ellipse cx={x} cy={y-9*s} rx={4*s} ry={3*s} fill={stem} opacity={.8}/></g>;
      if(stage===2)return <g key={i}><ellipse cx={x} cy={y} rx={6*s} ry={3} fill="#3a2810" opacity={.4}/><rect x={x-1.5} y={y-16*s} width={3} height={16*s} rx={1.5} fill={stem}/><path d={`M${x},${y-10*s} Q${x-8*s},${y-14*s} ${x-4*s},${y-8*s}`} fill={stem} opacity={.7}/><path d={`M${x},${y-10*s} Q${x+8*s},${y-14*s} ${x+4*s},${y-8*s}`} fill={stem} opacity={.7}/><ellipse cx={x} cy={y-17*s} rx={5*s} ry={4*s} fill={bloom} opacity={.9}/></g>;
      if(stage===3){const petals=[0,60,120,180,240,300];return <g key={i}><ellipse cx={x} cy={y} rx={7*s} ry={3} fill="#2a4010" opacity={.5}/><rect x={x-1.5} y={y-20*s} width={3} height={20*s} rx={1.5} fill={stem}/><path d={`M${x},${y-12*s} Q${x-9*s},${y-17*s} ${x-5*s},${y-10*s}`} fill={stem} opacity={.7}/><path d={`M${x},${y-12*s} Q${x+9*s},${y-17*s} ${x+5*s},${y-10*s}`} fill={stem} opacity={.7}/>{petals.map((a,pi)=>{const rad=a*Math.PI/180,px2=x+Math.cos(rad)*7*s,py2=y-21*s+Math.sin(rad)*7*s;return <ellipse key={pi} cx={px2} cy={py2} rx={4*s} ry={2.5*s} fill={bloom} transform={`rotate(${a},${px2},${py2})`} opacity={.9}/>;})}<circle cx={x} cy={y-21*s} r={3.5*s} fill="#ffd700"/></g>;}
      // stage 4 — pleine floraison with glow
      const petals4=[0,45,90,135,180,225,270,315];
      return <g key={i}><ellipse cx={x} cy={y} rx={8*s} ry={3.5} fill="#2a5010" opacity={.6}/><rect x={x-2} y={y-24*s} width={4} height={24*s} rx={2} fill={stem}/><path d={`M${x},${y-14*s} Q${x-11*s},${y-20*s} ${x-6*s},${y-11*s}`} fill={stem} opacity={.8}/><path d={`M${x},${y-14*s} Q${x+11*s},${y-20*s} ${x+6*s},${y-11*s}`} fill={stem} opacity={.8}/>{petals4.map((a,pi)=>{const rad=a*Math.PI/180,px2=x+Math.cos(rad)*9*s,py2=y-25*s+Math.sin(rad)*9*s;return <ellipse key={pi} cx={px2} cy={py2} rx={5*s} ry={3*s} fill={bloom} transform={`rotate(${a},${px2},${py2})`} opacity={.95}/>;})}<circle cx={x} cy={y-25*s} r={5*s} fill="#ffd700"/><circle cx={x} cy={y-25*s} r={7*s} fill="none" stroke="#ffd70066" strokeWidth={2}/></g>;
    };
    const bloomCount=stages.filter(s=>s>=4).length;
    const gardenMsg=todayMin===0?"🌱 Commence à travailler pour faire pousser ton jardin !":bloomCount===8?"🌺 Jardin en pleine floraison — journée légendaire !":bloomCount>0?`🌸 ${bloomCount} fleur${bloomCount>1?"s":""} en pleine floraison !`:`🌿 ${Math.floor(todayMin/30)} plante${Math.floor(todayMin/30)>1?"s":""} poussée${Math.floor(todayMin/30)>1?"s":""} — continue !`;
    return(
      <div style={{background:CARD,border:`1px solid #40802244`,borderRadius:"14px",padding:"12px",marginBottom:"16px",overflow:"hidden",position:"relative"}}>
        <div style={{position:"absolute",inset:0,background:"radial-gradient(ellipse at 50% 100%,#1a4a0a22,transparent 60%)",pointerEvents:"none"}}/>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:"8px"}}>
          <div style={{fontFamily:"'Orbitron',sans-serif",fontSize:".58rem",color:"#60c030",letterSpacing:".18em"}}>🌿 JARDIN DU JOUR</div>
          <div style={{fontFamily:"'Orbitron',sans-serif",fontSize:".56rem",color:todayMin>0?"#60c030":TEXT2}}>{Math.floor(todayMin/60)}h{String(todayMin%60).padStart(2,"0")} travaillées</div>
        </div>
        <svg viewBox="0 0 216 80" style={{width:"100%",height:"auto",display:"block"}}>
          <rect x="0" y="60" width="216" height="20" rx="4" fill="#2a4010"/>
          <rect x="0" y="63" width="216" height="4" fill="#3a6018"/>
          {GARDEN_PLANTS.map((p,i)=>renderPlant(p,stages[i],i))}
        </svg>
        <div style={{textAlign:"center",fontSize:".72rem",color:"#80c040",fontFamily:"'Exo 2',sans-serif",fontStyle:"italic",marginTop:"6px"}}>{gardenMsg}</div>
      </div>
    );
  };

  // ── MAIN LAYOUT ──────────────────────────────────────────────
  return(
    <div style={{minHeight:"100vh",background:BG,fontFamily:"'Rajdhani',sans-serif",color:TEXT,overflowX:"hidden"}}>
      <style>{CSS}</style>

      {ntf&&<div style={{position:"fixed",top:14,left:"50%",transform:"translateX(-50%)",zIndex:999,background:CARD2,border:`1px solid ${ntf.col}55`,borderRadius:"12px",padding:"10px 22px",color:ntf.col,fontFamily:"'Orbitron',sans-serif",fontSize:".72rem",letterSpacing:".1em",animation:"ntfAnim 3.2s ease forwards",whiteSpace:"nowrap",maxWidth:"92vw",textAlign:"center",boxShadow:`0 4px 24px ${ntf.col}22`}}>{ntf.msg}</div>}

      {/* LOGOUT MENU */}
      {showLogout&&(
        <div style={{position:"fixed",inset:0,zIndex:890,background:"rgba(8,12,24,.88)"}} onClick={()=>setShowLogout(false)}>
          <div onClick={e=>e.stopPropagation()} style={{position:"absolute",top:"70px",right:"14px",background:CARD,border:`1px solid ${BORDER}`,borderRadius:"14px",padding:"16px",minWidth:"220px",animation:"popIn .2s ease",boxShadow:"0 8px 32px rgba(0,0,0,.6)"}}>
            {user&&<div style={{marginBottom:"12px",paddingBottom:"12px",borderBottom:`1px solid ${BORDER}`}}>
              <div style={{fontFamily:"'Orbitron',sans-serif",fontSize:".56rem",color:TEXT2,letterSpacing:".12em",marginBottom:"4px"}}>CONNECTÉ EN TANT QUE</div>
              <div style={{fontSize:".88rem",color:TEXT,fontWeight:600,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{user.email}</div>
              <div style={{display:"flex",alignItems:"center",gap:"6px",marginTop:"6px"}}>
                {cloudStatus==="saving"&&<><span style={{width:"8px",height:"8px",borderRadius:"50%",background:"#ffb347",flexShrink:0,animation:"cloudPulse 1s ease infinite"}}/>
                  <span style={{fontSize:".66rem",color:"#ffb347",fontFamily:"'Orbitron',sans-serif"}}>Sauvegarde...</span></>}
                {cloudStatus==="saved"&&<><span style={{width:"8px",height:"8px",borderRadius:"50%",background:"#4dffc3",flexShrink:0}}/>
                  <span style={{fontSize:".66rem",color:"#4dffc3",fontFamily:"'Orbitron',sans-serif"}}>☁️ Sauvegardé</span></>}
                {cloudStatus==="error"&&<><span style={{width:"8px",height:"8px",borderRadius:"50%",background:"#ff6b8a",flexShrink:0}}/>
                  <span style={{fontSize:".66rem",color:"#ff6b8a",fontFamily:"'Orbitron',sans-serif"}}>Erreur sync</span></>}
                {cloudStatus==="idle"&&user&&<><span style={{width:"8px",height:"8px",borderRadius:"50%",background:"#4dffc355",flexShrink:0}}/>
                  <span style={{fontSize:".66rem",color:TEXT2,fontFamily:"'Orbitron',sans-serif"}}>Cloud actif</span></>}
              </div>
            </div>}
            {offline&&<div style={{marginBottom:"12px",padding:"8px 10px",background:"rgba(255,179,71,.1)",border:"1px solid #ffb34744",borderRadius:"8px"}}>
              <div style={{fontSize:".76rem",color:"#ffb347",fontWeight:600}}>Mode hors ligne</div>
              <div style={{fontSize:".68rem",color:TEXT2,marginTop:"2px",fontFamily:"'Exo 2',sans-serif",fontStyle:"italic"}}>Données sauvegardées localement</div>
            </div>}
            <button className="btn" onClick={handleLogout} style={{width:"100%",padding:"11px",background:"transparent",border:"1px solid #ff6b8a44",borderRadius:"9px",color:"#ff6b8a",fontFamily:"'Orbitron',sans-serif",fontSize:".68rem",fontWeight:700,cursor:"pointer"}}>
              SE DÉCONNECTER
            </button>
          </div>
        </div>
      )}

      {/* BUY CONFIRM */}
      {buyConf&&(<div style={{position:"fixed",inset:0,zIndex:900,background:"rgba(8,12,24,.9)",display:"flex",alignItems:"center",justifyContent:"center",padding:"20px"}} onClick={()=>setBuyConf(null)}>
        <div onClick={e=>e.stopPropagation()} style={{background:CARD,border:`2px solid ${RCAT[buyConf.cat]?.color||GOLD}`,borderRadius:"20px",padding:"26px 22px",maxWidth:"340px",width:"100%",textAlign:"center",animation:"popIn .25s ease"}}>
          <div style={{fontSize:"3rem",marginBottom:"10px"}}>{buyConf.icon}</div>
          <div style={{fontFamily:"'Orbitron',sans-serif",fontSize:".88rem",fontWeight:700,color:TEXT,marginBottom:"7px"}}>{buyConf.label}</div>
          <div style={{fontSize:".84rem",color:TEXT2,fontStyle:"italic",marginBottom:"16px",fontFamily:"'Exo 2',sans-serif"}}>{buyConf.desc}</div>
          <div style={{fontFamily:"'Orbitron',sans-serif",fontSize:"1.1rem",color:GOLD,fontWeight:900,marginBottom:"20px"}}>🪙 {buyConf.cost}</div>
          <div style={{display:"flex",gap:"10px"}}>
            <button className="btn" onClick={()=>setBuyConf(null)} style={{flex:1,padding:"12px",background:CARD2,border:`1px solid ${BORDER}`,borderRadius:"10px",color:TEXT2,fontFamily:"'Orbitron',sans-serif",fontSize:".7rem",fontWeight:700,cursor:"pointer"}}>ANNULER</button>
            <button className="btn" onClick={()=>buyReward(buyConf)} style={{flex:2,padding:"12px",background:"linear-gradient(135deg,#1a2a10,#2a4a18)",border:"2px solid #4dffc3",borderRadius:"10px",color:"#4dffc3",fontFamily:"'Orbitron',sans-serif",fontSize:".74rem",fontWeight:900,cursor:"pointer"}}>✅ ACHETER</button>
          </div>
        </div>
      </div>)}

      {/* PLANNING CELL MODAL */}
      {editCell&&(<div style={{position:"fixed",inset:0,zIndex:900,background:"rgba(8,12,24,.92)",display:"flex",alignItems:"flex-end",justifyContent:"center"}} onClick={()=>setEditCell(null)}>
        <div onClick={e=>e.stopPropagation()} style={{background:CARD,border:`1px solid ${BORDER}`,borderRadius:"20px 20px 0 0",padding:"22px 18px 30px",width:"100%",maxWidth:"520px",animation:"fadeUp .2s ease"}}>
          <div style={{fontFamily:"'Orbitron',sans-serif",fontSize:".64rem",color:TEXT2,letterSpacing:".14em",marginBottom:"12px",textAlign:"center"}}>{DAYS_LABEL[editCell.d]} · {HOURS[editCell.h]}h00 – {HOURS[editCell.h]+1===24?0:HOURS[editCell.h]+1}h00</div>
          <input value={cellTxt} onChange={e=>setCellTxt(e.target.value)} onKeyDown={e=>e.key==="Enter"&&saveCell()} autoFocus placeholder="Activité... (Maths, Sport, Repos, etc.)" style={{width:"100%",background:CARD2,border:`1px solid ${BORDER}`,borderRadius:"10px",padding:"12px 14px",color:TEXT,fontSize:"1rem",outline:"none",marginBottom:"12px"}}/>
          <div style={{display:"flex",gap:"7px",marginBottom:"12px",flexWrap:"wrap"}}>
            {SCHED_COLORS.map(c=><button key={c} onClick={()=>setCellCol(c)} style={{width:"32px",height:"32px",borderRadius:"50%",background:c,border:`3px solid ${cellCol===c?"white":CARD2}`,cursor:"pointer",boxShadow:cellCol===c?`0 0 10px ${c}`:"none",flexShrink:0}}/>)}
          </div>
          <div style={{display:"flex",alignItems:"center",gap:"12px",marginBottom:"15px",padding:"11px 14px",background:CARD2,borderRadius:"10px",border:`1px solid ${cellAlert?"#ffb34766":BORDER}`}}>
            <div style={{flex:1}}>
              <div style={{fontSize:".9rem",color:TEXT,fontWeight:600}}>🔔 Alerte à l'heure</div>
              <div style={{fontSize:".7rem",color:TEXT2,fontFamily:"'Exo 2',sans-serif",marginTop:"2px"}}>Notification quand ce créneau commence</div>
              {notifPerm!=="granted"&&<button className="btn" onClick={requestNotifPerm} style={{marginTop:"6px",padding:"4px 10px",background:"transparent",border:"1px solid #ffb34755",borderRadius:"6px",color:"#ffb347",fontSize:".58rem",fontFamily:"'Orbitron',sans-serif",cursor:"pointer"}}>ACTIVER LES NOTIFS</button>}
            </div>
            <div onClick={()=>setCellAlert(v=>!v)} style={{width:"46px",height:"26px",borderRadius:"13px",background:cellAlert?"#ffb347":"#2a3050",border:`2px solid ${cellAlert?"#ffb347":BORDER}`,cursor:"pointer",position:"relative",transition:"all .2s",flexShrink:0}}>
              <div style={{position:"absolute",top:"2px",[cellAlert?"right":"left"]:"2px",width:"18px",height:"18px",borderRadius:"50%",background:"white",transition:"all .2s",boxShadow:"0 1px 4px rgba(0,0,0,.4)"}}/>
            </div>
          </div>
          <div style={{display:"flex",gap:"8px"}}>
            <button className="btn" onClick={clearCell} style={{flex:1,padding:"10px",background:"transparent",border:"1px solid #ff6b8a44",borderRadius:"9px",color:"#ff6b8a",fontFamily:"'Orbitron',sans-serif",fontSize:".62rem",cursor:"pointer",fontWeight:700}}>EFFACER</button>
            <button className="btn" onClick={()=>setEditCell(null)} style={{flex:1,padding:"10px",background:CARD2,border:`1px solid ${BORDER}`,borderRadius:"9px",color:TEXT2,fontFamily:"'Orbitron',sans-serif",fontSize:".62rem",cursor:"pointer",fontWeight:700}}>ANNULER</button>
            <button className="btn" onClick={saveCell} style={{flex:2,padding:"10px",background:"linear-gradient(135deg,#1a3050,#2a4070)",border:"1px solid #60b8ff",borderRadius:"9px",color:"#60b8ff",fontFamily:"'Orbitron',sans-serif",fontSize:".64rem",fontWeight:900,cursor:"pointer"}}>SAUVEGARDER</button>
          </div>
        </div>
      </div>)}

      {/* BOX REVEAL */}
      {boxAnim&&(
        <div style={{position:"fixed",inset:0,zIndex:1000,background:"rgba(5,8,20,.97)",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",cursor:"pointer"}} onClick={()=>setBoxAnim(null)}>
          <div style={{textAlign:"center",animation:"fadeInS .5s ease",padding:"20px"}}>
            <div style={{fontFamily:"'Orbitron',sans-serif",fontSize:".7rem",color:RARITY[boxAnim.creature.rarity].color,letterSpacing:".3em",marginBottom:"10px",animation:"heroGlow 2s ease infinite"}}>✦ {RARITY[boxAnim.creature.rarity].label.toUpperCase()} ✦</div>

      </div>

      {/* BOTTOM NAV */}
      <div style={{position:"fixed",bottom:0,left:0,right:0,zIndex:100,background:`rgba(15,22,41,.98)`,backdropFilter:"blur(24px)",borderTop:`1px solid ${BORDER}`}}>
        <div style={{maxWidth:"520px",margin:"0 auto",display:"flex",padding:"5px 0 max(9px,env(safe-area-inset-bottom))"}}>
          {[{id:"hub",icon:"🏠",l:"HUB"},{id:"avatar",icon:"👤",l:"AVATAR"},{id:"planning",icon:"📅",l:"PLANNING"},{id:"clan",icon:"⚔️",l:"CLAN"},{id:"shop",icon:"🛒",l:"SHOP"},{id:"bestiary",icon:"🐉",l:"BÊTES"},{id:"world",icon:"🗺️",l:"MONDE"},{id:"hero",icon:"🏆",l:"HÉROS"},{id:"grimoire",icon:"📔",l:"GRIMOIRE"}].map(n=>(
            <button key={n.id} className="nb" onClick={()=>setScr(n.id)} style={{flex:1,padding:"6px 1px",border:"none",background:"transparent",borderTop:`2px solid ${scr===n.id?GOLD:"transparent"}`,color:scr===n.id?GOLD:TEXT2,fontFamily:"'Orbitron',sans-serif",fontSize:".38rem",fontWeight:700,letterSpacing:".04em",cursor:"pointer",transition:"all .15s",position:"relative"}}>
              <div style={{fontSize:".9rem",marginBottom:"2px"}}>{n.icon}</div>{n.l}
              {n.id==="clan"&&clan&&<div style={{position:"absolute",top:2,right:"50%",transform:"translateX(8px)",width:"6px",height:"6px",borderRadius:"50%",background:GOLD}}/>}
            </button>
          ))}
        </div>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════════
// APP ROOT — gère l'auth
// ══════════════════════════════════════════════════════════════════
function App(){
  const [user,   setUser]   = useState(null);
  const [checking,setCheck] = useState(true);
  const [offline,setOffline]= useState(false);

  useEffect(()=>{
    if(!IS_CONFIGURED||!sb){setCheck(false);return;}
    sb.auth.getSession().then(({data:{session}})=>{setUser(session?.user??null);setCheck(false);});
    const {data:{subscription}}=sb.auth.onAuthStateChange((_,session)=>setUser(session?.user??null));
    return()=>subscription.unsubscribe();
  },[]);

  // Loading
  if(checking) return(
    <div style={{minHeight:"100vh",background:"#0f1629",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:"18px"}}>
      <style>{`@import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@900&display=swap');*{box-sizing:border-box;margin:0;padding:0}@keyframes spin{to{transform:rotate(360deg)}}@keyframes glow{0%,100%{text-shadow:0 0 14px #ffd70055}50%{text-shadow:0 0 36px #ffd700}}`}</style>
      <div style={{width:"48px",height:"48px",border:"3px solid #2d3d6a",borderTopColor:"#ffd700",borderRadius:"50%",animation:"spin .7s linear infinite"}}/>
      <div style={{fontFamily:"'Orbitron',sans-serif",fontSize:".7rem",color:"#8090b8",letterSpacing:".25em"}}>CONNEXION...</div>
    </div>
  );

  // Supabase not configured → show setup guide (unless offline chosen)
  if(!IS_CONFIGURED&&!offline) return <SetupGuide onOffline={()=>setOffline(true)}/>;

  // Configured but no user yet and not offline → show auth
  if(IS_CONFIGURED&&!user&&!offline) return <AuthScreen onOffline={()=>setOffline(true)}/>;

  // Play!
  return <Game user={user} offline={offline||!IS_CONFIGURED}/>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
